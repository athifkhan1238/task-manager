<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid background with rounded corners -->
  <rect width="192" height="192" rx="50" fill="#6366f1"/>
  
  <!-- Main content area -->
  <g transform="translate(40, 45)">
    <!-- Large clipboard/task icon -->
    <!-- Clipboard body -->
    <rect x="0" y="12" width="110" height="85" rx="6" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Clipboard clip/header -->
    <rect x="35" y="0" width="40" height="18" rx="4" fill="white"/>
    
    <!-- Task items (checkboxes with lines) -->
    <!-- Task 1 -->
    <g>
      <circle cx="15" cy="28" r="6" fill="none" stroke="white" stroke-width="4"/>
      <line x1="32" y1="28" x2="90" y2="28" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Task 2 -->
    <g>
      <circle cx="15" cy="45" r="6" fill="none" stroke="white" stroke-width="4"/>
      <line x1="32" y1="45" x2="90" y2="45" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Task 3 (completed) -->
    <g>
      <circle cx="15" cy="62" r="6" fill="white" stroke="white" stroke-width="4"/>
      <polyline points="10,62 14,68 22,56" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Task 4 -->
    <g>
      <circle cx="15" cy="79" r="6" fill="none" stroke="white" stroke-width="4"/>
      <line x1="32" y1="79" x2="90" y2="79" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
</svg>
