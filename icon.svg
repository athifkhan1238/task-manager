// ── SERVICE WORKER — Task Manager PWA ────────────────────────────────────────
const CACHE_NAME = 'task-manager-v1';
const ASSETS = ['./index.html', './manifest.json'];

// ── INSTALL: cache the app shell ─────────────────────────────────────────────
self.addEventListener('install', (e) => {
    e.waitUntil(
        caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS))
    );
    self.skipWaiting();
});

// ── ACTIVATE: clean old caches ────────────────────────────────────────────────
self.addEventListener('activate', (e) => {
    e.waitUntil(
        caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
        )
    );
    self.clients.claim();
});

// ── FETCH: serve from cache, fallback to network ──────────────────────────────
self.addEventListener('fetch', (e) => {
    e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request))
    );
});

// ── NOTIFICATION CLICK: open the app ─────────────────────────────────────────
self.addEventListener('notificationclick', (e) => {
    const { action } = e;
    
    // Handle action button clicks
    if (action === 'dismiss') {
        e.notification.close();
        return;
    }
    
    // Default: open app
    e.notification.close();
    e.waitUntil(
        clients.matchAll({ type: 'window', includeUncontrolled: true }).then(clientList => {
            for (const client of clientList) {
                if (client.url.includes('index.html') && 'focus' in client) {
                    return client.focus();
                }
            }
            if (clients.openWindow) return clients.openWindow('./index.html');
        })
    );
});

// ── NOTIFICATION CLOSE: track when user closes notification ────────────────────
self.addEventListener('notificationclose', (e) => {
    console.log('[Service Worker] Notification closed:', e.notification.tag);
});

// ── PUSH: receive push from main thread ───────────────────────────────────────
self.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'NOTIFY') {
        const { title, body, tag, requireInteraction } = e.data;
        
        // Check if it's an attendance notification (has 'att-' prefix)
        const isAttendanceNotif = tag.includes('att-');
        
        // Different vibration patterns for different notification types
        let vibration = [200, 100, 200]; // Default
        if (tag.includes('overdue')) {
            vibration = [300, 150, 300]; // Strong for overdue
        } else if (isAttendanceNotif && tag.includes('critical')) {
            vibration = [400, 200, 400]; // Extra strong for critical attendance
        } else if (isAttendanceNotif && tag.includes('warning')) {
            vibration = [200, 100, 200]; // Medium for warning
        } else if (isAttendanceNotif && tag.includes('recovered')) {
            vibration = [100, 50, 100]; // Light for positive news
        }
        
        self.registration.showNotification(title, {
            body,
            tag,
            icon: './icon-192.png',
            badge: './icon-192.png',
            vibrate: vibration,
            requireInteraction: requireInteraction || isAttendanceNotif,
            actions: [
                { action: 'open', title: 'Open App' },
                { action: 'dismiss', title: 'Dismiss' }
            ],
            data: {
                url: './index.html',
                isAttendance: isAttendanceNotif
            }
        });
    }
});
